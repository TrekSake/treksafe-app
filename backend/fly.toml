# TrekSafe API — Fly.io
# https://fly.io/docs/reference/configuration/

app = "treksafe-api"
primary_region = "iad"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/api/salud"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
